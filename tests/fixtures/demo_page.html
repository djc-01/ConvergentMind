<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ConvergentMind Demo</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 2rem auto;
        max-width: 720px;
        line-height: 1.5;
      }
      form {
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid #d0d7de;
        border-radius: 12px;
      }
      label {
        display: grid;
        gap: 0.25rem;
      }
      .result {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #eef6ff;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>ConvergentMind Form</h1>
    <p>Fill the form and submit it to reveal a success message.</p>
    <form id="demo-form">
      <label>
        Name
        <input id="name" name="name" placeholder="Type a name" />
      </label>
      <label>
        Email
        <input id="email" name="email" placeholder="Type an email" />
      </label>
      <button type="submit">Submit Demo</button>
    </form>
    <div id="result" class="result" aria-live="polite">Waiting for submission...</div>

    <script>
      const form = document.getElementById("demo-form");
      const result = document.getElementById("result");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const name = document.getElementById("name").value || "Anonymous";
        const email = document.getElementById("email").value || "unknown@example.com";
        result.textContent = `Submitted for ${name} (${email})`;
      });
    </script>
  </body>
</html>
